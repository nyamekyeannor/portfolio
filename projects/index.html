<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projects | My Portfolio Template</title>
  <meta name="description" content="Example projects index for the portfolio template.">
  <link rel="icon" href="../assets/img/avatar.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script>
    (function () {
      var t = localStorage.getItem("portfolio-theme");
      document.documentElement.dataset.theme = t === "light" ? "light" : "dark";
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="nav-shell">
      <a class="nav-avatar-link" href="../index.html" data-home-link aria-label="Home">
        <img class="nav-avatar" data-bind-src="site.avatar" src="../assets/img/avatar.jpg" alt="Nyamekye Annor">
        <span class="nav-name">Nyamekye Annor</span>
      </a>
      <div class="nav-right">
        <nav class="nav-links" aria-label="Main navigation" data-render="nav"></nav>
        <div class="nav-social social-links" data-render="social"></div>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle color theme"></button>
        <button class="hamburger" type="button" aria-label="Open menu" aria-expanded="false" data-hamburger></button>
      </div>
    </div>
    <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
      <div class="mobile-menu-inner">
        <nav class="mobile-nav-links" aria-label="Mobile navigation" data-render="nav"></nav>
        <div class="mobile-menu-bottom">
          <div class="social-links" data-render="social"></div>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle color theme"></button>
        </div>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <p class="eyebrow">Builds</p>
      <h1>Projects</h1>
      <p class="lede">Use this page for repos, products, demos, case studies, and tools.</p>
    </section>

    <section class="section" aria-labelledby="projects-heading">
      <div class="section-header">
        <div>
          <h2 id="projects-heading">All Projects</h2>
          <p class="section-kicker">Edit `projects` in `content/site-data.js`.</p>
        </div>
      </div>
      <div class="grid" data-render="projects"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p data-bind="site.footerNote">© 2026 Nyamekye Annor · Developer Advocate · matcha > coffee</p>
    </div>
  </footer>

  <script>window.PORTFOLIO_BASE = "../";</script>
  <script src="../content/site-data.js"></script>
  <script src="../assets/js/render.js"></script>
</body>
</html>
